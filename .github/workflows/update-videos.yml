name: Update YouTube videos

on:
  schedule:
    - cron: '23 4 * * *'      # daily at 04:23 UTC, off the hour to dodge cron pile-ups
  workflow_dispatch:           # manual run via Actions tab

permissions:
  contents: write              # required to commit videos.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest videos from YouTube Data API
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_HANDLE: '@JaredOwen'
        run: node .github/scripts/fetch-videos.mjs

      - name: Commit if videos.json changed
        run: |
          if [[ -n "$(git status --porcelain videos.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add videos.json
            git commit -m "Update latest YouTube videos"
            git push
          else
            echo "No change in videos.json — skipping commit."
          fi
