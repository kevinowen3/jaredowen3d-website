name: Update YouTube stats

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours, off the hour to dodge cron pile-ups
  workflow_dispatch:          # manual run via Actions tab

permissions:
  contents: write             # required to commit stats.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch stats from YouTube Data API
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_HANDLE: '@JaredOwen'
        run: node .github/scripts/fetch-stats.mjs

      - name: Commit if stats.json changed
        run: |
          if [[ -n "$(git status --porcelain stats.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add stats.json
            git commit -m "Update YouTube stats"
            git push
          else
            echo "No change in stats.json — skipping commit."
          fi
